<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kobe Vaccine Tracker — Sổ tay tiêm chủng</title>
    <meta name="description"
        content="Theo dõi lịch tiêm chủng bé Kobe — Check/Uncheck, nhắc lịch qua Email & Calendar, tư vấn AI">
    <meta name="theme-color" content="#0f172a">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👶</text></svg>">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #f8fafc;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse2 {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .5;
            }
        }

        .ani-spin {
            animation: spin 1s linear infinite;
        }

        .ani-pulse {
            animation: pulse2 2s ease-in-out infinite;
        }

        input:focus {
            outline: none;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // ====== ICON COMPONENTS (replace lucide-react) ======
        const Icon = ({ d, size = 20, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d={d} /></svg>
        );
        const IconMulti = ({ paths, size = 20, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{paths.map((p, i) => <path key={i} d={p} />)}</svg>
        );
        const BabyIcon = ({ size = 20, className = "" }) => <IconMulti size={size} className={className} paths={["M9 12h.01", "M15 12h.01", "M10 16c.5.3 1.2.5 2 .5s1.5-.2 2-.5", "M19 6.3a9 9 0 0 1 1.8 3.9 2 2 0 0 1 0 3.6 9 9 0 0 1-17.6 0 2 2 0 0 1 0-3.6A9 9 0 0 1 12 3c2 0 3.5 1.1 3.5 2.5s-.9 2.5-2 2.5c-.8 0-1.5-.4-1.5-1"]} />;
        const CalendarIcon = ({ size = 20, className = "" }) => <IconMulti size={size} className={className} paths={["M8 2v4", "M16 2v4", "M3 10h18", "M21 8.5V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8.5"]} />;
        const CheckIcon = ({ size = 20, className = "" }) => <IconMulti size={size} className={className} paths={["M22 11.08V12a10 10 0 1 1-5.93-9.14", "m9 11 3 3L22 4"]} />;
        const ClockIcon = ({ size = 20, className = "" }) => <IconMulti size={size} className={className} paths={["M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z", "M12 6v6l4 2"]} />;
        const SparklesIcon = ({ size = 20, className = "" }) => <IconMulti size={size} className={className} paths={["m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z", "M5 3v4", "M19 17v4", "M3 5h4", "M17 19h4"]} />;
        const SendIcon = ({ size = 20, className = "" }) => <IconMulti size={size} className={className} paths={["m22 2-7 20-4-9-9-4Z", "M22 2 11 13"]} />;
        const XIcon = ({ size = 20, className = "" }) => <IconMulti size={size} className={className} paths={["M18 6 6 18", "M6 6l12 12"]} />;
        const MailIcon = ({ size = 20, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="16" x="2" y="4" rx="2" /><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" /></svg>
        );
        const StethIcon = ({ size = 20, className = "" }) => <IconMulti size={size} className={className} paths={["M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6 6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3", "M8 15v1a6 6 0 0 0 6 6 6 6 0 0 0 6-6v-4", "M22 10a2 2 0 1 0-4 0 2 2 0 0 0 4 0z"]} />;
        const LoaderIcon = ({ size = 20, className = "" }) => <Icon size={size} className={className} d="M21 12a9 9 0 1 1-6.219-8.56" />;
        const AlertIcon = ({ size = 20, className = "" }) => <IconMulti size={size} className={className} paths={["M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z", "M12 8v4", "M12 16h.01"]} />;

        // ====== DATA ======
        const VACCINE_DATA = [
            { id: 1, date: '2026-03-26', age: '1 tháng 29 ngày', name: 'Infanrix Hexa (6 trong 1) — Mũi 1', origin: 'Bỉ', disease: 'Bạch hầu, Ho gà, Uốn ván, Bại liệt, Viêm gan B, Hib', price: 1098000, milestone: 'MỐC 2 THÁNG TUỔI' },
            { id: 2, date: '2026-04-02', age: '2 tháng 6 ngày', name: 'Rotateq — Liều uống 1', origin: 'Mỹ', disease: 'Tiêu chảy cấp do Rotavirus', price: 665000, milestone: 'MỐC 2 THÁNG TUỔI' },
            { id: 3, date: '2026-04-09', age: '2 tháng 13 ngày', name: 'Prevenar 13 (Phế cầu) — Mũi 1', origin: 'Bỉ', disease: 'Viêm phổi, Viêm màng não, Viêm tai giữa do phế cầu', price: 1190000, milestone: 'MỐC 2 THÁNG TUỔI' },
            { id: 4, date: '2026-04-16', age: '2 tháng 20 ngày', name: 'Bexsero (Não mô cầu B) — Mũi 1', origin: 'Ý', disease: 'Viêm màng não do não mô cầu nhóm B', price: 1788000, milestone: 'MỐC 2 THÁNG TUỔI' },
            { id: 5, date: '2026-04-23', age: '2 tháng 27 ngày', name: 'Vaxigrip Tetra (Cúm) — Mũi 1', origin: 'Pháp', disease: 'Cúm mùa', price: 385000, milestone: 'MỐC 2 THÁNG TUỔI' },
            { id: 6, date: '2026-05-21', age: '3 tháng 25 ngày', name: 'Infanrix Hexa (6 trong 1) — Mũi 2', origin: 'Bỉ', disease: 'Bạch hầu, Ho gà, Uốn ván, Bại liệt, Viêm gan B, Hib', price: 1098000, milestone: 'MỐC 4 THÁNG TUỔI' },
            { id: 7, date: '2026-05-28', age: '4 tháng 2 ngày', name: 'Rotateq — Liều uống 2', origin: 'Mỹ', disease: 'Tiêu chảy cấp do Rotavirus', price: 665000, milestone: 'MỐC 4 THÁNG TUỔI' },
            { id: 8, date: '2026-06-04', age: '4 tháng 9 ngày', name: 'Prevenar 13 (Phế cầu) — Mũi 2', origin: 'Bỉ', disease: 'Viêm phổi, Viêm màng não, Viêm tai giữa do phế cầu', price: 1190000, milestone: 'MỐC 4 THÁNG TUỔI' },
            { id: 9, date: '2026-06-11', age: '4 tháng 16 ngày', name: 'Bexsero (Não mô cầu B) — Mũi 2', origin: 'Ý', disease: 'Viêm màng não do não mô cầu nhóm B', price: 1788000, milestone: 'MỐC 4 THÁNG TUỔI' },
            { id: 10, date: '2026-06-18', age: '4 tháng 23 ngày', name: 'Vaxigrip Tetra (Cúm) — Mũi 2', origin: 'Pháp', disease: 'Cúm mùa (nhắc lại)', price: 385000, milestone: 'MỐC 4 THÁNG TUỔI' },
            { id: 11, date: '2026-07-23', age: '5 tháng 27 ngày', name: 'Infanrix Hexa (6 trong 1) — Mũi 3', origin: 'Bỉ', disease: 'Bạch hầu, Ho gà, Uốn ván, Bại liệt, Viêm gan B, Hib', price: 1098000, milestone: 'MỐC 6 THÁNG TUỔI' },
            { id: 12, date: '2026-07-30', age: '6 tháng 4 ngày', name: 'Rotateq — Liều uống 3', origin: 'Mỹ', disease: 'Tiêu chảy cấp do Rotavirus', price: 665000, milestone: 'MỐC 6 THÁNG TUỔI' },
            { id: 13, date: '2026-08-06', age: '6 tháng 11 ngày', name: 'Prevenar 13 (Phế cầu) — Mũi 3', origin: 'Bỉ', disease: 'Viêm phổi, Viêm màng não, Viêm tai giữa do phế cầu', price: 1190000, milestone: 'MỐC 6 THÁNG TUỔI' },
            { id: 14, date: '2026-08-20', age: '6 tháng 25 ngày', name: 'Menactra (Não mô cầu ACYW) — Mũi 1', origin: 'Mỹ', disease: 'Viêm màng não do não mô cầu A, C, Y, W', price: 1350000, milestone: 'MỐC 6 THÁNG TUỔI' },
            { id: 15, date: '2026-10-22', age: '8 tháng 26 ngày', name: 'MVVAC (Sởi đơn)', origin: 'Việt Nam', disease: 'Sởi', price: 250000, milestone: 'MỐC 9 THÁNG TUỔI' },
            { id: 16, date: '2026-10-29', age: '9 tháng 3 ngày', name: 'Menactra (Não mô cầu ACYW) — Mũi 2', origin: 'Mỹ', disease: 'Viêm màng não do não mô cầu A, C, Y, W', price: 1350000, milestone: 'MỐC 9 THÁNG TUỔI' },
            { id: 17, date: '2026-11-05', age: '9 tháng 10 ngày', name: 'Jevax (Viêm não Nhật Bản) — Mũi 1', origin: 'Việt Nam', disease: 'Viêm não Nhật Bản', price: 155000, milestone: 'MỐC 9 THÁNG TUỔI' },
            { id: 18, date: '2027-01-28', age: '12 tháng 7 ngày', name: 'MMR / Priorix (Sởi-Quai bị-Rubella) — Mũi 1', origin: 'Mỹ/Bỉ', disease: 'Sởi, Quai bị, Rubella', price: 350000, milestone: 'MỐC 12 THÁNG TUỔI' },
            { id: 19, date: '2027-02-04', age: '12 tháng 14 ngày', name: 'Varivax (Thủy đậu) — Mũi 1', origin: 'Mỹ', disease: 'Thủy đậu', price: 985000, milestone: 'MỐC 12 THÁNG TUỔI' },
            { id: 20, date: '2027-02-11', age: '12 tháng 21 ngày', name: 'Imojev (Viêm não Nhật Bản) — Mũi 1', origin: 'Thái Lan', disease: 'Viêm não Nhật Bản', price: 988000, milestone: 'MỐC 12 THÁNG TUỔI' },
            { id: 21, date: '2027-02-18', age: '12 tháng 28 ngày', name: 'Prevenar 13 (Phế cầu) — Mũi nhắc', origin: 'Bỉ', disease: 'Phế cầu (nhắc lại)', price: 1190000, milestone: 'MỐC 12 THÁNG TUỔI' },
            { id: 22, date: '2027-02-25', age: '13 tháng 5 ngày', name: 'Bexsero (Não mô cầu B) — Mũi nhắc', origin: 'Ý', disease: 'Não mô cầu B (nhắc lại)', price: 1788000, milestone: 'MỐC 12 THÁNG TUỔI' },
            { id: 23, date: '2027-03-04', age: '13 tháng 12 ngày', name: 'MenQuadfi — Mũi nhắc', origin: 'Pháp', disease: 'Não mô cầu ACYW', price: 1350000, milestone: 'MỐC 12 THÁNG TUỔI' },
        ];

        const BUDGET = 27168000;
        const API_KEY = "";

        // ====== HELPERS ======
        const fmtPrice = (p) => new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(p);
        const fmtDateVN = (ds) => new Date(ds + 'T00:00:00').toLocaleDateString('vi-VN', { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric' });
        const toICS = (ds) => new Date(ds + 'T08:00:00').toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, '');

        const makeICS = (list) => {
            const evts = list.map(v => {
                const s = toICS(v.date);
                const e = new Date(v.date + 'T09:00:00').toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, '');
                return `BEGIN:VEVENT\nDTSTART:${s}\nDTEND:${e}\nSUMMARY:💉 Tiêm chủng bé Kobe: ${v.name}\nDESCRIPTION:Phòng: ${v.disease}\\nXuất xứ: ${v.origin}\\nChi phí: ${new Intl.NumberFormat('vi-VN').format(v.price)} VND\\nNhớ mang sổ tiêm chủng!\nLOCATION:VNVC / Long Châu\nBEGIN:VALARM\nTRIGGER:-P1D\nACTION:DISPLAY\nDESCRIPTION:Nhắc tiêm bé Kobe ngày mai!\nEND:VALARM\nBEGIN:VALARM\nTRIGGER:-PT2H\nACTION:DISPLAY\nDESCRIPTION:Tiêm bé Kobe trong 2 giờ nữa!\nEND:VALARM\nEND:VEVENT`;
            }).join('\n');
            return `BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//KobeTracker//VI\nCALSCALE:GREGORIAN\nX-WR-CALNAME:Lịch tiêm chủng bé Kobe\n${evts}\nEND:VCALENDAR`;
        };

        const makeEmailBody = (data, doneIds) => {
            const up = data.filter(v => !doneIds.includes(v.id));
            const dn = data.filter(v => doneIds.includes(v.id));
            let b = `📋 LỊCH TIÊM CHỦNG BÉ KOBE (Sinh 26/01/2026)\n━━━━━━━━━━━━━━━━━━━━━━━━━\n\n📊 Tiến độ: ${dn.length}/${data.length} mũi\n\n`;
            if (up.length) {
                b += `🔔 SẮP TỚI:\n`;
                let ms = '';
                up.forEach(v => {
                    if (v.milestone !== ms) { ms = v.milestone; b += `\n📅 ${ms}\n──────────────\n`; }
                    b += `  ${v.id}. ${fmtDateVN(v.date)}\n     💉 ${v.name} (${v.origin})\n     🛡️ ${v.disease}\n     💰 ${new Intl.NumberFormat('vi-VN').format(v.price)} VND\n\n`;
                });
            }
            if (dn.length) { b += `\n✅ ĐÃ TIÊM:\n`; dn.forEach(v => { b += `  ✓ ${v.name}\n`; }); }
            b += `\n⚠️ Mỗi lần chỉ tiêm 1 mũi. Cần bác sĩ xác nhận.\nGửi từ Kobe Tracker 👶`;
            return b;
        };

        const dlFile = (content, name, type) => {
            const b = new Blob([content], { type });
            const u = URL.createObjectURL(b);
            const a = document.createElement('a');
            a.href = u; a.download = name; document.body.appendChild(a); a.click();
            document.body.removeChild(a); URL.revokeObjectURL(u);
        };

        // ====== MAIN APP ======
        const App = () => {
            const [doneIds, setDoneIds] = useState([]);
            const [search, setSearch] = useState('');
            const [tab, setTab] = useState('all');
            const [aiOpen, setAiOpen] = useState(false);
            const [mailOpen, setMailOpen] = useState(false);
            const [chat, setChat] = useState([]);
            const [input, setInput] = useState('');
            const [aiLoad, setAiLoad] = useState(false);
            const [email, setEmail] = useState('');
            const [toast, setToast] = useState('');
            const [headerOpen, setHeaderOpen] = useState(false);
            const chatEnd = useRef(null);

            useEffect(() => {
                try { const s = localStorage.getItem('kobe_vaccine_v4_ai'); if (s) setDoneIds(JSON.parse(s)); } catch { }
                try { const e = localStorage.getItem('kobe_email'); if (e) setEmail(e); } catch { }
            }, []);
            useEffect(() => { chatEnd.current?.scrollIntoView({ behavior: 'smooth' }); }, [chat]);

            const toggle = (id) => {
                const n = doneIds.includes(id) ? doneIds.filter(i => i !== id) : [...doneIds, id];
                setDoneIds(n); localStorage.setItem('kobe_vaccine_v4_ai', JSON.stringify(n));
            };

            const filtered = useMemo(() => VACCINE_DATA.filter(v => {
                const m = v.name.toLowerCase().includes(search.toLowerCase()) || v.disease.toLowerCase().includes(search.toLowerCase());
                const d = doneIds.includes(v.id);
                if (tab === 'todo') return m && !d; if (tab === 'done') return m && d; return m;
            }), [search, tab, doneIds]);

            const spent = VACCINE_DATA.filter(v => doneIds.includes(v.id)).reduce((a, c) => a + c.price, 0);
            const remaining = BUDGET - spent;
            const pct = Math.round((doneIds.length / VACCINE_DATA.length) * 100) || 0;
            const next = VACCINE_DATA.find(v => !doneIds.includes(v.id));
            const upcoming = VACCINE_DATA.filter(v => !doneIds.includes(v.id));

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 3500); };

            // Email
            const sendEmail = () => {
                if (!email.trim()) return;
                localStorage.setItem('kobe_email', email);
                const subj = encodeURIComponent(`🔔 Lịch tiêm chủng bé Kobe — ${upcoming.length} mũi sắp tới`);
                const body = encodeURIComponent(makeEmailBody(VACCINE_DATA, doneIds));
                window.open(`mailto:${email}?subject=${subj}&body=${body}`, '_blank');
                showToast('✅ Đã mở app email!');
            };

            // Calendar
            const dlCalAll = () => { dlFile(makeICS(upcoming), 'kobe-vaccine.ics', 'text/calendar'); showToast('✅ Đã tải lịch!'); };
            const dlCal1 = (v) => { dlFile(makeICS([v]), `kobe-${v.id}.ics`, 'text/calendar'); showToast(`📅 Đã tải lịch mũi ${v.id}`); };

            // AI
            const callAI = async (prompt) => {
                if (!API_KEY) { setChat(p => [...p, { role: 'ai', text: '⚠️ Chưa cấu hình API Key. Vui lòng thêm Gemini API key vào biến API_KEY trong code.' }]); return; }
                setAiLoad(true);
                let delay = 1000;
                for (let i = 0; i < 5; i++) {
                    try {
                        const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: "Bạn là trợ lý y tế chuyên tiêm chủng trẻ nhỏ. Trả lời tiếng Việt, ngắn gọn, nhắc tham khảo bác sĩ." }] } }) });
                        const d = await r.json(); const t = d.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (t) { setChat(p => [...p, { role: 'ai', text: t }]); setAiLoad(false); return; }
                    } catch { if (i === 4) setChat(p => [...p, { role: 'ai', text: 'Xin lỗi, gặp lỗi kết nối. Thử lại sau ạ.' }]); await new Promise(r => setTimeout(r, delay)); delay *= 2; }
                }
                setAiLoad(false);
            };
            const sendMsg = (t = input) => { if (!t.trim()) return; setChat(p => [...p, { role: 'user', text: t }]); setInput(''); callAI(t); };
            const askNext = () => { if (!next) return; setAiOpen(true); sendMsg(`✨ Tư vấn mũi tiêm: ${next.name}. Bé khoảng ${next.age}. Phòng: ${next.disease}. Cho 3 lưu ý trước tiêm và 3 phản ứng phụ thường gặp.`); };

            return (
                <div className="min-h-screen bg-slate-50 pb-24">
                    {/* HEADER — compact by default */}
                    <header className="bg-slate-900 text-white sticky top-0 z-50 shadow-2xl" style={{ borderRadius: '0 0 20px 20px' }}>
                        {/* Mini bar — always visible */}
                        <div className="px-4 py-2.5 flex items-center justify-between">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => setHeaderOpen(!headerOpen)}>
                                <div className="bg-blue-600 p-1.5 rounded-xl shadow-lg"><BabyIcon size={22} /></div>
                                <div>
                                    <span className="text-sm font-black tracking-tight">KOBE</span>
                                    <span className="text-blue-400 text-sm font-black ml-1">TRACKER</span>
                                </div>
                                {/* Progress pill */}
                                <div className="bg-white/10 px-2 py-0.5 rounded-full flex items-center gap-1.5 ml-1">
                                    <div className="w-12 h-1.5 bg-white/20 rounded-full overflow-hidden"><div className="h-full bg-green-400 rounded-full transition-all duration-700" style={{ width: `${pct}%` }} /></div>
                                    <span className="text-[10px] font-black text-green-400">{pct}%</span>
                                </div>
                            </div>
                            <div className="flex gap-1.5">
                                <button onClick={() => setMailOpen(true)} className="bg-emerald-600/20 text-emerald-400 p-1.5 rounded-full border border-emerald-400/30"><MailIcon size={16} /></button>
                                <button onClick={() => setAiOpen(true)} className="bg-blue-600/20 text-blue-400 p-1.5 rounded-full border border-blue-400/30"><SparklesIcon size={16} className="ani-pulse" /></button>
                                <button onClick={() => setHeaderOpen(!headerOpen)} className="bg-white/10 text-white/50 p-1.5 rounded-full">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ transform: headerOpen ? 'rotate(180deg)' : 'rotate(0)', transition: 'transform 0.2s' }}><path d="m6 9 6 6 6-6" /></svg>
                                </button>
                            </div>
                        </div>

                        {/* Expandable panel */}
                        {headerOpen && (
                            <div className="px-4 pb-4 pt-1 space-y-3" style={{ animation: 'fadeSlide 0.2s ease' }}>
                                <style>{`@keyframes fadeSlide{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}`}</style>
                                <div className="bg-white/5 rounded-[20px] p-4 border border-white/10 relative overflow-hidden">
                                    <div className="relative z-10 flex justify-between items-center">
                                        <div>
                                            <span className="text-[9px] font-black text-neutral-400 uppercase tracking-widest block mb-1">Ngân sách còn lại</span>
                                            <div className="text-2xl font-black">{fmtPrice(remaining)}</div>
                                        </div>
                                        <div className="text-right">
                                            <span className="text-[9px] font-bold text-neutral-500 italic block">Tổng: {fmtPrice(BUDGET)}</span>
                                            <div className="text-lg font-bold text-green-400 mt-1">{doneIds.length}/{VACCINE_DATA.length} mũi</div>
                                        </div>
                                    </div>
                                    <div className="absolute bottom-0 left-0 h-1 bg-blue-500 transition-all duration-700" style={{ width: `${pct}%` }} />
                                </div>
                                <div className="grid grid-cols-3 gap-2 text-center">
                                    <div className="bg-white/5 rounded-xl p-2 border border-white/10">
                                        <div className="text-base font-black text-emerald-400">{doneIds.length}</div>
                                        <div className="text-[8px] font-bold text-neutral-500 uppercase">Đã tiêm</div>
                                    </div>
                                    <div className="bg-white/5 rounded-xl p-2 border border-white/10">
                                        <div className="text-base font-black text-amber-400">{upcoming.length}</div>
                                        <div className="text-[8px] font-bold text-neutral-500 uppercase">Còn lại</div>
                                    </div>
                                    <div className="bg-white/5 rounded-xl p-2 border border-white/10">
                                        <div className="text-base font-black text-blue-400">{fmtPrice(spent)}</div>
                                        <div className="text-[8px] font-bold text-neutral-500 uppercase">Đã chi</div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </header>

                    <main className="max-w-xl mx-auto px-4 mt-6">
                        {/* Quick Actions */}
                        <div className="grid grid-cols-1 gap-2.5 mb-6">
                            <button onClick={askNext} disabled={!next} className="bg-gradient-to-r from-indigo-600 to-blue-600 text-white p-3.5 rounded-2xl shadow-lg flex items-center justify-between active:scale-[0.98] transition-transform">
                                <div className="flex items-center gap-3 text-left">
                                    <div className="bg-white/20 p-2 rounded-xl"><StethIcon size={18} /></div>
                                    <div>
                                        <p className="text-[10px] font-bold text-blue-100 uppercase tracking-wider">Mũi tiếp theo</p>
                                        <p className="text-sm font-black truncate max-w-[200px]">{next ? next.name : 'Hoàn thành!'}</p>
                                    </div>
                                </div>
                                <div className="bg-white text-blue-600 px-2.5 py-1 rounded-full text-[9px] font-black shrink-0">✨ AI</div>
                            </button>
                            <button onClick={() => setMailOpen(true)} className="bg-gradient-to-r from-emerald-600 to-teal-600 text-white p-3.5 rounded-2xl shadow-lg flex items-center justify-between active:scale-[0.98] transition-transform">
                                <div className="flex items-center gap-3 text-left">
                                    <div className="bg-white/20 p-2 rounded-xl"><MailIcon size={18} /></div>
                                    <div>
                                        <p className="text-[10px] font-bold text-emerald-100 uppercase tracking-wider">Nhắc lịch tiêm</p>
                                        <p className="text-sm font-black">{upcoming.length} mũi · Email & Calendar</p>
                                    </div>
                                </div>
                                <div className="bg-white text-emerald-600 px-2.5 py-1 rounded-full text-[9px] font-black shrink-0">📧 GỬI</div>
                            </button>
                        </div>

                        {/* Filter tabs */}
                        <div className="sticky top-[52px] z-40 bg-slate-50/95 backdrop-blur-md pb-3 pt-1">
                            <div className="flex bg-neutral-200/50 p-1 rounded-2xl border border-neutral-200">
                                {['all', 'todo', 'done'].map(t => (
                                    <button key={t} onClick={() => setTab(t)} className={`flex-1 py-2 text-[10px] font-black rounded-xl transition-all ${tab === t ? 'bg-white shadow-md text-blue-600' : 'text-neutral-500'}`}>
                                        {t === 'all' ? `TẤT CẢ (${VACCINE_DATA.length})` : t === 'todo' ? `CẦN TIÊM (${upcoming.length})` : `ĐÃ TIÊM (${doneIds.length})`}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Vaccine List */}
                        <div className="mt-4 space-y-6 relative pb-16">
                            <div className="absolute left-[25px] top-6 bottom-6 w-0.5 bg-neutral-200 rounded-full" />
                            {filtered.map((v, i) => {
                                const first = i === 0 || v.milestone !== filtered[i - 1].milestone;
                                const done = doneIds.includes(v.id);
                                return (
                                    <div key={v.id} className="relative z-10">
                                        {first && (
                                            <div className="bg-slate-800 text-white px-4 py-1.5 rounded-xl inline-flex items-center gap-2 mb-6 ml-1 shadow-lg">
                                                <ClockIcon size={14} className="text-blue-400" />
                                                <span className="text-[10px] font-black uppercase tracking-[0.15em]">{v.milestone}</span>
                                            </div>
                                        )}
                                        <div className="flex gap-4 group">
                                            <div onClick={() => toggle(v.id)} className={`w-12 h-12 rounded-[18px] flex items-center justify-center shrink-0 border-[3px] transition-all cursor-pointer shadow-sm ${done ? 'bg-green-500 border-green-100 scale-110' : 'bg-white border-neutral-100 active:scale-90'}`}>
                                                {done ? <CheckIcon size={22} className="text-white" /> : <span className="text-sm font-black text-neutral-300">{v.id}</span>}
                                            </div>
                                            <div className={`flex-1 bg-white rounded-[24px] p-5 shadow-sm border border-neutral-100 transition-all active:shadow-lg ${done ? 'opacity-50' : ''}`}>
                                                <div className="flex justify-between items-center mb-3">
                                                    <div className="bg-slate-100 text-slate-600 px-2.5 py-0.5 rounded-lg text-[9px] font-black uppercase">{v.age}</div>
                                                    <div className="flex items-center gap-1 text-[10px] font-bold text-neutral-400">
                                                        <CalendarIcon size={12} />{new Date(v.date).toLocaleDateString('vi-VN')}
                                                    </div>
                                                </div>
                                                <h3 onClick={() => toggle(v.id)} className={`text-base font-black leading-tight mb-2 cursor-pointer ${done ? 'line-through text-neutral-400' : 'text-slate-800'}`}>{v.name}</h3>
                                                <p className="text-[10px] text-slate-400 mb-3 leading-relaxed">🛡️ {v.disease}</p>
                                                <div className="flex justify-between items-center pt-3 border-t border-neutral-50">
                                                    <span className="text-[9px] font-black text-neutral-300 uppercase tracking-widest">Chi phí</span>
                                                    <div className="flex items-center gap-2">
                                                        {!done && <button onClick={(e) => { e.stopPropagation(); dlCal1(v); }} className="bg-emerald-50 text-emerald-600 px-2 py-0.5 rounded-md text-[9px] font-bold active:bg-emerald-100">📅 Nhắc</button>}
                                                        <span className="text-sm font-black text-slate-800">{fmtPrice(v.price)}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>);
                            })}
                            {filtered.length === 0 && <div className="text-center py-16 text-neutral-400 text-sm font-bold">Không có mũi nào phù hợp</div>}
                        </div>
                    </main>

                    {/* ====== EMAIL/CALENDAR MODAL ====== */}
                    {mailOpen && (
                        <div className="fixed inset-0 z-[100] flex flex-col bg-white">
                            <div className="bg-gradient-to-r from-emerald-700 to-teal-700 p-5 flex justify-between items-center shrink-0 shadow-lg">
                                <div className="flex items-center gap-3">
                                    <div className="bg-white/20 p-2 rounded-xl"><MailIcon size={22} className="text-white" /></div>
                                    <div>
                                        <h2 className="text-white font-black text-lg tracking-tight">NHẮC LỊCH TIÊM</h2>
                                        <p className="text-emerald-200 text-[9px] font-bold uppercase tracking-widest">Email & Calendar</p>
                                    </div>
                                </div>
                                <button onClick={() => setMailOpen(false)} className="bg-white/10 p-2 rounded-full text-white/50 active:text-white"><XIcon size={22} /></button>
                            </div>
                            <div className="flex-1 overflow-y-auto p-5 space-y-5 bg-slate-50">
                                {/* Stats */}
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-white rounded-2xl p-4 border border-slate-100 text-center shadow-sm">
                                        <div className="text-3xl font-black text-emerald-600">{upcoming.length}</div>
                                        <div className="text-[9px] font-bold text-slate-400 uppercase tracking-wider mt-1">Chưa tiêm</div>
                                    </div>
                                    <div className="bg-white rounded-2xl p-4 border border-slate-100 text-center shadow-sm">
                                        <div className="text-3xl font-black text-blue-600">{doneIds.length}</div>
                                        <div className="text-[9px] font-bold text-slate-400 uppercase tracking-wider mt-1">Đã tiêm</div>
                                    </div>
                                </div>

                                {/* Send Email */}
                                <div className="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm">
                                    <div className="flex items-center gap-3 mb-4">
                                        <div className="bg-emerald-100 p-2 rounded-xl"><MailIcon size={18} className="text-emerald-600" /></div>
                                        <div>
                                            <h3 className="font-black text-slate-800 text-sm">Gửi Email nhắc lịch</h3>
                                            <p className="text-[10px] text-slate-400">Toàn bộ lịch tiêm gửi qua email</p>
                                        </div>
                                    </div>
                                    <input type="email" placeholder="your@email.com" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:ring-2 focus:ring-emerald-500 mb-3" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key === 'Enter' && sendEmail()} />
                                    <button onClick={sendEmail} disabled={!email.trim()} className="w-full bg-gradient-to-r from-emerald-600 to-teal-600 text-white py-3 rounded-xl font-black text-sm disabled:opacity-50 active:opacity-80 flex items-center justify-center gap-2 shadow-lg shadow-emerald-500/20">
                                        <SendIcon size={16} /> Soạn email nhắc lịch
                                    </button>
                                </div>

                                {/* Calendar Download */}
                                <div className="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm">
                                    <div className="flex items-center gap-3 mb-4">
                                        <div className="bg-blue-100 p-2 rounded-xl"><CalendarIcon size={18} className="text-blue-600" /></div>
                                        <div>
                                            <h3 className="font-black text-slate-800 text-sm">Thêm vào Lịch điện thoại</h3>
                                            <p className="text-[10px] text-slate-400">File .ics → tự nhắc trước 1 ngày & 2 giờ</p>
                                        </div>
                                    </div>
                                    <button onClick={dlCalAll} className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-3 rounded-xl font-black text-sm active:opacity-80 flex items-center justify-center gap-2 shadow-lg shadow-blue-500/20">
                                        📅 Tải {upcoming.length} lịch hẹn vào Calendar
                                    </button>
                                    <p className="text-[9px] text-slate-400 mt-2 text-center italic">Mở file .ics → thêm vào Google/Apple Calendar</p>
                                </div>

                                {/* List */}
                                <div className="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm">
                                    <h3 className="font-black text-slate-800 text-sm mb-3 flex items-center gap-2"><AlertIcon size={16} className="text-amber-500" /> Mũi sắp tới</h3>
                                    <div className="space-y-2 max-h-[280px] overflow-y-auto">
                                        {upcoming.map(v => (
                                            <div key={v.id} className="flex items-center gap-3 p-2.5 bg-slate-50 rounded-xl">
                                                <div className="bg-slate-200 w-7 h-7 rounded-lg flex items-center justify-center text-[10px] font-black text-slate-500">{v.id}</div>
                                                <div className="flex-1 min-w-0">
                                                    <p className="text-[11px] font-bold text-slate-700 truncate">{v.name}</p>
                                                    <p className="text-[9px] text-slate-400">{fmtDateVN(v.date)}</p>
                                                </div>
                                                <button onClick={() => dlCal1(v)} className="bg-blue-50 text-blue-600 px-2 py-1 rounded-lg text-[9px] font-bold active:bg-blue-100 shrink-0">📅</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ====== AI MODAL ====== */}
                    {aiOpen && (
                        <div className="fixed inset-0 z-[100] flex flex-col bg-white">
                            <div className="bg-slate-900 p-5 flex justify-between items-center shrink-0 shadow-lg">
                                <div className="flex items-center gap-3">
                                    <div className="bg-blue-600 p-2 rounded-xl"><SparklesIcon size={22} className="text-white" /></div>
                                    <div>
                                        <h2 className="text-white font-black text-lg">TRỢ LÝ ✨ AI</h2>
                                        <p className="text-blue-300 text-[9px] font-bold uppercase tracking-widest">Tư vấn tiêm chủng bé Kobe</p>
                                    </div>
                                </div>
                                <button onClick={() => setAiOpen(false)} className="bg-white/10 p-2 rounded-full text-white/50 active:text-white"><XIcon size={22} /></button>
                            </div>
                            <div className="flex-1 overflow-y-auto p-5 space-y-4 bg-slate-50">
                                {chat.length === 0 && <div className="text-center py-12 opacity-50"><BabyIcon size={56} className="mx-auto mb-3 text-slate-300" /><p className="text-sm font-bold text-slate-400 uppercase tracking-widest">Hãy đặt câu hỏi ạ</p></div>}
                                {chat.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[85%] p-4 rounded-2xl text-sm leading-relaxed shadow-sm ${m.role === 'user' ? 'bg-blue-600 text-white rounded-br-none' : 'bg-white text-slate-800 border border-slate-100 rounded-bl-none'}`}>
                                            {m.text.split('\n').map((l, j) => <p key={j} className={l.startsWith('#') || l.startsWith('*') ? 'font-bold' : ''}>{l}</p>)}
                                        </div>
                                    </div>
                                ))}
                                {aiLoad && <div className="flex justify-start"><div className="bg-white p-3 rounded-2xl border border-slate-100 flex items-center gap-2"><LoaderIcon size={16} className="text-blue-500 ani-spin" /><span className="text-xs font-bold text-slate-400 italic">AI đang suy nghĩ...</span></div></div>}
                                <div ref={chatEnd} />
                            </div>
                            <div className="p-5 bg-white border-t border-slate-100 shrink-0">
                                <div className="flex gap-2">
                                    <input type="text" placeholder="Hỏi về vắc xin, phản ứng phụ..." className="flex-1 bg-slate-100 rounded-xl px-4 py-3 text-sm font-medium focus:ring-2 focus:ring-blue-500" value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && sendMsg()} />
                                    <button onClick={() => sendMsg()} disabled={aiLoad || !input.trim()} className="bg-blue-600 text-white p-3 rounded-xl disabled:opacity-50 active:bg-blue-700 shadow-lg shadow-blue-500/20"><SendIcon size={18} /></button>
                                </div>
                                <p className="text-center text-[9px] text-slate-400 mt-3 italic">AI có thể nhầm. Xác nhận với bác sĩ.</p>
                            </div>
                        </div>
                    )}

                    {/* Toast */}
                    {toast && <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[200] bg-slate-900 text-white px-5 py-2.5 rounded-xl shadow-2xl text-sm font-bold animate-bounce">{toast}</div>}

                    {/* FAB */}
                    {!aiOpen && !mailOpen && (
                        <button onClick={() => setAiOpen(true)} className="fixed bottom-5 right-5 bg-slate-900 text-white w-12 h-12 rounded-xl shadow-2xl flex items-center justify-center active:scale-90 transition-transform z-40 border border-white/10">
                            <SparklesIcon size={22} className="text-blue-400" />
                        </button>
                    )}
                </div>);
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>

</html>
